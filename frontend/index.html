<!doctype html>

<html>
  <head>
    <title>Agentic AI Data Analyst</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .card {
        background: white;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
        width: 380px;
        text-align: center;
      }

      h2 {
        margin-bottom: 20px;
        color: #333;
      }

      input {
        width: 90%;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
        margin-bottom: 15px;
      }

      button {
        padding: 12px 20px;
        border: none;
        border-radius: 6px;
        background: #667eea;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #4f63d6;
      }

      #download {
        display: block;
        margin-top: 18px;
        font-weight: bold;
        color: #4f63d6;
        text-decoration: none;
      }

      .loading {
        margin-top: 15px;
        display: none;
      }

      .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #667eea;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .status {
        margin-top: 10px;
        font-size: 14px;
        color: green;
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Agentic AI Data Analyst</h2>

      <input id="question" placeholder="Ask a question about sales data" />

      <br />

      <button onclick="ask()">Generate PDF</button>

      <div class="loading" id="loading">
        <div class="spinner"></div>

        <p>Generating report...</p>
      </div>

      <div class="status" id="status">PDF generated successfully</div>

      <a id="download" target="_blank"></a>
    </div>

    <script>
      async function ask() {
        const question = document.getElementById("question").value;

        document.getElementById("loading").style.display = "block";
        document.getElementById("status").style.display = "none";
        document.getElementById("download").innerHTML = "";

        const response = await fetch("http://127.0.0.1:8000/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: question }),
        });

        const data = await response.json();

        document.getElementById("loading").style.display = "none";

        document.getElementById("status").style.display = "block";

        document.getElementById("download").innerHTML = "Download PDF Report";

        document.getElementById("download").href =
          "http://127.0.0.1:8000/" + data.pdf;
      }
    </script>
  </body>
</html>
